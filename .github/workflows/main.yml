name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # Job 1: Test & Lint Backend
  backend-ci:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest httpx fastapi uvicorn sqlalchemy psycopg2-binary numpy opencv-python-headless pillow passlib bcrypt pyjwt websockets python-jose[cryptography] qrcode pydantic-settings
        # Install CPU torch for testing compilation
        pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 backend --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings
        flake8 backend --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run PyTest Tests
      env:
        MOCK_INFERENCE: "True" # Force mock mode for GitHub runners
        LOCAL_STORAGE_DIR: "./backend/data"
      run: |
        cd backend
        python -m pytest

  # Job 2: Build & Lint Frontend
  frontend-ci:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: "18"
        cache: 'npm'
        cache-dependency-path: './frontend/package.json'

    - name: Install dependencies
      run: |
        cd frontend
        npm install

    - name: Build Next.js
      run: |
        cd frontend
        npm run build

  # Job 3: Docker Build check
  docker-build:
    needs: [backend-ci, frontend-ci]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Backend Image
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        file: ./backend/Dockerfile
        push: false
        tags: anime-portrait-backend:latest

    - name: Build Frontend Image
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        push: false
        tags: anime-portrait-frontend:latest
