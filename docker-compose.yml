version: '3.8'

services:
  # 1. PostgreSQL Database
  postgres-db:
    image: postgres:15-alpine
    container_name: anime_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: anime_studio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. Redis Caching & Spooler
  redis:
    image: redis:7-alpine
    container_name: anime_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # 3. MinIO Object Storage
  minio:
    image: minio/minio
    container_name: anime_minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # 4. FastAPI AI Backend
  fastapi-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: anime_backend
    restart: always
    environment:
      - ENV=production
      - DEBUG=False
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_HOST=postgres-db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=anime_studio
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - USE_S3=True
      - S3_ENDPOINT=minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_SECURE=False
      - S3_BUCKET_NAME=anime-studio-bucket
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
      - model_cache:/app/models_cache
    depends_on:
      - postgres-db
      - redis
      - minio
    # Configure NVIDIA GPU CUDA passthrough for RTX 4090 execution
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # 5. Next.js React Frontend
  next-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: anime_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - fastapi-backend

volumes:
  postgres_data:
  redis_data:
  minio_data:
  model_cache:
